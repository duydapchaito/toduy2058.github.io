<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Duy</title>
    <style>
        /* Phần này là CSS - giúp làm đẹp layout */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #007bff; }
        p { color: #555; }
        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Chào Duy nhé! 👋</h1>
        <p>Đây không còn là tờ giấy trắng nữa rồi. Trang web của bạn đã có layout cơ bản.</p>
        <a href="#" class="btn">Bấm chơi cho vui</a>
    </div>

</body>
</html>
